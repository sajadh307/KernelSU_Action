name: Build Kernel (FINAL FIXED)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 📥 Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: prabhatkrmishra/kernel_motorola_fogos
          ref: "15.0"
          path: kernel

      - name: ⚙️ Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bc bison flex libssl-dev libelf-dev \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            git python3 rsync curl

      # ✅ USE STABLE KernelSU (IMPORTANT)
      - name: 🔗 Integrate KernelSU
        run: |
          cd kernel
          curl -LSs https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh | bash -

      - name: 🏗️ Build Kernel (FINAL STABLE)
        run: |
          cd kernel

          export ARCH=arm64
          export SUBARCH=arm64

          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

          mkdir -p out

          make O=out ARCH=arm64 vendor/fogos_defconfig

          # 🔥 CRITICAL FIXES (minimal but required)
          scripts/config --file out/.config -d CONFIG_DEBUG_INFO
          scripts/config --file out/.config -d CONFIG_DEBUG_INFO_BTF
          scripts/config --file out/.config -d CONFIG_WERROR

          make O=out ARCH=arm64 olddefconfig

          make -j$(nproc) O=out \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-

      - name: 📦 Package Kernel
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cp kernel/out/arch/arm64/boot/Image.gz AnyKernel3/ || true
          cd AnyKernel3
          zip -r9 kernel.zip *

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fogos-kernel
          path: AnyKernel3/kernel.zip
