name: Build Kernel for Motorola G45 (fogos) - KernelSU-Next

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 📥 Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: prabhatkrmishra/kernel_motorola_fogos
          ref: "15.0"
          path: kernel

      - name: ⚙️ Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bc bison flex libssl-dev libelf-dev \
            git ccache dwarves python3 rsync curl wget

      - name: 🔧 Setup ccache
        run: |
          export USE_CCACHE=1
          export CCACHE_EXEC=$(which ccache)
          ccache -M 10G

      - name: 🔗 Integrate KernelSU-Next
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -

      - name: ⬇️ Download AOSP Clang
        run: |
          wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master-kernel-build-2022.tar.gz -O clang.tar.gz
          mkdir clang
          tar -xzf clang.tar.gz -C clang

      - name: 🏗️ Build Kernel (FIXED FINAL)
        run: |
          cd kernel

          export ARCH=arm64
          export SUBARCH=arm64

          # ✅ FORCE CLANG EVERYWHERE (MAIN FIX)
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          export CC=clang
          export CXX=clang++
          export HOSTCC=clang
          export HOSTCXX=clang++

          export LLVM=1
          export LLVM_IAS=1

          # Prevent wrong gcc usage
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

          mkdir -p out

          make O=out ARCH=arm64 fogos_defconfig

          make -j$(nproc) O=out \
            ARCH=arm64 \
            CC=clang \
            HOSTCC=clang \
            HOSTCXX=clang++ \
            LLVM=1 \
            LLVM_IAS=1

      - name: 📦 Clone AnyKernel3
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git AnyKernel3

      - name: 📦 Package Kernel
        run: |
          cp kernel/out/arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          zip -r9 kernel-fogos-KSU.zip *

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fogos-kernel-KSU
          path: AnyKernel3/kernel-fogos-KSU.zip
