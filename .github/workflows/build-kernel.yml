name: Build Kernel for Motorola G45 (fogos) - KernelSU-Next (FINAL SUCCESS FIXED)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 📥 Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: prabhatkrmishra/kernel_motorola_fogos
          ref: "15.0"
          path: kernel

      - name: ⚙️ Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bc bison flex libssl-dev libelf-dev \
            git ccache dwarves python3 rsync curl wget \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            clang lld

      - name: 🔗 Integrate KernelSU-Next
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -

      - name: 🏗️ Build Kernel (FINAL REAL FIX)
        run: |
          cd kernel

          export ARCH=arm64
          export SUBARCH=arm64

          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

          export CC=clang
          export LD=ld.lld

          mkdir -p out

          make O=out ARCH=arm64 vendor/fogos_defconfig || make O=out ARCH=arm64 defconfig

          # 🔥 CRITICAL FINAL FIX
          scripts/config --file out/.config -d CONFIG_DEBUG_INFO
          scripts/config --file out/.config -d CONFIG_DEBUG_INFO_DWARF4
          scripts/config --file out/.config -d CONFIG_DEBUG_INFO_BTF

          make O=out ARCH=arm64 olddefconfig

          make -j$(nproc) O=out \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            CC=clang \
            LD=ld.lld

      - name: 📦 Clone AnyKernel3
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git AnyKernel3

      - name: 📦 Package Kernel
        run: |
          cp kernel/out/arch/arm64/boot/Image.gz AnyKernel3/ || echo "Image.gz not found!"
          cd AnyKernel3
          zip -r9 kernel-fogos-KSU.zip *

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fogos-kernel-KSU
          path: AnyKernel3/kernel-fogos-KSU.zip
