name: Build Kernel for Motorola G45 (fogos) - KernelSU-Next (GCC FIXED)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 📥 Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: prabhatkrmishra/kernel_motorola_fogos
          ref: "15.0"
          path: kernel

      - name: ⚙️ Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bc bison flex libssl-dev libelf-dev \
            git ccache dwarves python3 rsync curl wget

      # ✅ FIX: Use proper GNU toolchain
      - name: ⬇️ Download GCC Toolchain (GNU)
        run: |
          wget https://mirrors.edge.kernel.org/pub/tools/crosstool/files/bin/x86_64/12.0.0/x86_64-gcc-12.0.0-nolibc-aarch64-linux.tar.xz
          mkdir gcc64
          tar -xf x86_64-gcc-12.0.0-nolibc-aarch64-linux.tar.xz -C gcc64 --strip-components=1

      - name: 🔗 Integrate KernelSU-Next
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -

      - name: 🏗️ Build Kernel (GCC FINAL FIXED)
        run: |
          cd kernel

          export ARCH=arm64
          export SUBARCH=arm64

          # ✅ FIX PATH
          export PATH=$GITHUB_WORKSPACE/gcc64/bin:$PATH

          # ✅ MATCH TOOLCHAIN PREFIX
          export CROSS_COMPILE=aarch64-linux-

          mkdir -p out

          make O=out ARCH=arm64 vendor/fogos_defconfig || make O=out ARCH=arm64 defconfig

          make -j$(nproc) O=out \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-

      - name: 📦 Clone AnyKernel3
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git AnyKernel3

      - name: 📦 Package Kernel
        run: |
          cp kernel/out/arch/arm64/boot/Image.gz AnyKernel3/ || echo "Image.gz not found!"
          cd AnyKernel3
          zip -r9 kernel-fogos-KSU.zip *

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fogos-kernel-KSU
          path: AnyKernel3/kernel-fogos-KSU.zip
